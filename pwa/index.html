<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>gread</title>
    <meta name="theme-color" content="#15171c" />
    <!-- iOS "Add to Home Screen" support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="gread" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <style>
      :root { color-scheme: dark light; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { height: 100%; margin: 0; }
      body {
        /* Theme variables; overridden per [data-theme]. */
        --bg: #15171c;
        --panel: #20242c;
        --panel-edge: #333944;
        --fg: #e6e6e6;
        --muted: #9aa0aa;
        --pivot: #ff5252;
        --accent: #2f6feb;
        --guide: #3a3f48;

        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--fg);
        display: flex;
        flex-direction: column;
        /* Respect notches/safe areas on iOS. */
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
                 env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      body[data-theme="light"] {
        --bg: #fafafa; --panel: #ececec; --panel-edge: #d4d4d4; --fg: #1a1a1a;
        --muted: #6a6a6a; --pivot: #d32f2f; --accent: #2f6feb; --guide: #c4c4c4;
      }
      body[data-theme="sepia"] {
        --bg: #f4ecdc; --panel: #e8dcc4; --panel-edge: #d3c2a0; --fg: #433422;
        --muted: #8a7a5e; --pivot: #b3402a; --accent: #a9762f; --guide: #cbb892;
      }

      .screen { flex: 1; display: none; flex-direction: column; min-height: 100vh; }
      .screen.active { display: flex; }

      /* ---- input screen ---- */
      #input-screen { padding: 1.25rem; gap: 1rem; }
      .brand { display: flex; align-items: baseline; gap: 0.6rem; }
      .brand h1 { font-size: 1.4rem; margin: 0; font-weight: 700; }
      .brand .pivot { color: var(--pivot); }
      .brand .tag { font-size: 0.8rem; color: var(--muted); }
      textarea {
        flex: 1; min-height: 40vh; width: 100%; resize: none;
        background: var(--panel); color: var(--fg);
        border: 1px solid var(--panel-edge); border-radius: 12px;
        padding: 1rem; font-size: 1rem; font-family: inherit;
      }
      .primary {
        background: var(--accent); color: #fff; border: none; border-radius: 12px;
        padding: 1rem; font-size: 1.05rem; font-weight: 600; cursor: pointer; width: 100%;
      }
      .primary:disabled { opacity: 0.4; }
      .abs { font-size: 0.9rem; }
      .abs summary { color: var(--muted); cursor: pointer; padding: 0.4rem 0; }
      .abs > *:not(summary) { margin-top: 0.6rem; }
      .text {
        width: 100%; background: var(--panel); color: var(--fg);
        border: 1px solid var(--panel-edge); border-radius: 10px;
        padding: 0.75rem; font-size: 0.95rem; font-family: inherit;
      }
      .status { font-size: 0.82rem; color: var(--muted); min-height: 1.2em; }
      .status.error { color: var(--pivot); }

      /* ---- chapter picker ---- */
      #chapter-screen { padding: 1rem; gap: 0.75rem; }
      .book-title { font-size: 1.15rem; margin: 0.25rem 0.25rem 0.5rem; }
      .chapter-list { list-style: none; margin: 0; padding: 0; overflow-y: auto; }
      .chapter-list button {
        width: 100%; text-align: left; background: var(--panel); color: var(--fg);
        border: 1px solid var(--panel-edge); border-radius: 10px;
        padding: 0.85rem 1rem; margin-bottom: 0.5rem; cursor: pointer; font-size: 0.95rem;
        display: flex; justify-content: space-between; gap: 1rem;
      }
      .chapter-list .count { color: var(--muted); font-size: 0.8rem; white-space: nowrap; }

      /* ---- reader screen ---- */
      #reader-screen { padding: 1rem; }
      .topbar { display: flex; justify-content: space-between; align-items: center; }
      .iconbtn {
        background: var(--panel); color: var(--fg); border: 1px solid var(--panel-edge);
        border-radius: 10px; padding: 0.5rem 0.8rem; font-size: 0.95rem; cursor: pointer;
      }
      .stage {
        flex: 1; display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 2rem; cursor: pointer;
      }
      .word {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: clamp(2.25rem, 11vw, 4rem); line-height: 1;
        display: grid; grid-template-columns: 1fr auto 1fr;
        width: min(620px, 92vw); position: relative;
      }
      .word .left { text-align: right; white-space: pre; }
      .word .pivot { text-align: center; white-space: pre; color: var(--pivot); }
      .word .right { text-align: left; white-space: pre; }
      .word::before, .word::after {
        content: ""; position: absolute; left: 50%; width: 2px; height: 0.6rem;
        background: var(--guide); transform: translateX(-50%);
      }
      .word::before { top: -1.1rem; }
      .word::after { bottom: -1.1rem; }

      .panel { display: flex; flex-direction: column; gap: 0.9rem; width: min(620px, 92vw); margin: 0 auto; }
      .scrub { width: 100%; accent-color: var(--accent); height: 1.75rem; }
      .meta { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--muted); font-variant-numeric: tabular-nums; }
      .transport { display: flex; gap: 0.5rem; justify-content: center; }
      .transport button {
        flex: 1; max-width: 5rem; background: var(--panel); color: var(--fg);
        border: 1px solid var(--panel-edge); border-radius: 12px;
        padding: 0.7rem 0; font-size: 1.2rem; cursor: pointer;
      }
      .transport button.play { max-width: 7rem; }
      .fields { display: flex; flex-wrap: wrap; gap: 0.75rem 1.25rem; align-items: center; justify-content: center; }
      .field { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; color: var(--muted); }
      .field input[type="range"] { accent-color: var(--accent); }
      .field .val { color: var(--fg); font-variant-numeric: tabular-nums; min-width: 2.5rem; }
      select {
        background: var(--panel); color: var(--fg); border: 1px solid var(--panel-edge);
        border-radius: 10px; padding: 0.4rem 0.5rem; font-size: 0.82rem;
      }
    </style>
  </head>
  <body>
    <!-- Paste/input screen -->
    <section id="input-screen" class="screen active">
      <div class="brand">
        <h1>g<span class="pivot">r</span>ead</h1>
        <span class="tag">speed reader</span>
      </div>
      <textarea id="input" placeholder="Paste or type text to speed-read…"></textarea>
      <button id="read" class="primary" disabled>Read</button>

      <details id="abs" class="abs">
        <summary>Open from Audiobookshelf</summary>
        <input id="abs-url" class="text" type="url" autocomplete="off"
               placeholder="Server URL (https://…/audiobookshelf)" />
        <input id="abs-key" class="text" type="password" autocomplete="off"
               placeholder="API key" />
        <input id="abs-item" class="text" type="text" autocomplete="off"
               placeholder="Item URL or ID" />
        <button id="abs-open" class="primary">Open</button>
        <div id="abs-status" class="status"></div>
      </details>
    </section>

    <!-- Chapter picker screen -->
    <section id="chapter-screen" class="screen">
      <div class="topbar">
        <button id="chapter-back" class="iconbtn">‹ Back</button>
      </div>
      <h2 id="book-title" class="book-title"></h2>
      <ul id="chapter-list" class="chapter-list"></ul>
    </section>

    <!-- Reader screen -->
    <section id="reader-screen" class="screen">
      <div class="topbar">
        <button id="back" class="iconbtn">‹ Text</button>
        <select id="theme" aria-label="Theme"></select>
      </div>

      <div class="stage" id="stage">
        <div class="word" id="word"></div>
      </div>

      <div class="panel">
        <input type="range" id="scrub" class="scrub" min="0" max="0" value="0" />
        <div class="meta"><span id="position">0 / 0</span><span id="eta">—</span></div>
        <div class="transport">
          <button id="restart" title="Start">⏮</button>
          <button id="step-back" title="Back">◀</button>
          <button id="playpause" class="play">▶</button>
          <button id="step-fwd" title="Forward">▶</button>
        </div>
        <div class="fields">
          <label class="field">WPM <input type="range" id="wpm" min="100" max="1000" step="25" /> <span class="val" id="wpm-val"></span></label>
          <label class="field">Chunk <input type="range" id="chunk" min="1" max="3" step="1" /> <span class="val" id="chunk-val"></span></label>
        </div>
      </div>
    </section>

    <script type="module" src="../src/pwa/main.ts"></script>
  </body>
</html>
