<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>gread</title>
    <meta name="theme-color" content="#15171c" />
    <!-- iOS "Add to Home Screen" support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="gread" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <style>
      :root { color-scheme: dark light; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { height: 100%; margin: 0; }
      body {
        /* Size to the *dynamic* viewport so mobile browser chrome doesn't push
           the page taller than the visible area, and never scroll the shell —
           only inner lists scroll. */
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        /* Theme variables; overridden per [data-theme]. */
        --bg: #15171c;
        --panel: #20242c;
        --panel-edge: #333944;
        --fg: #e6e6e6;
        --muted: #9aa0aa;
        --pivot: #ff5252;
        --accent: #2f6feb;
        --guide: #3a3f48;

        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--fg);
        display: flex;
        flex-direction: column;
        /* Respect notches/safe areas on iOS. */
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
                 env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      body[data-theme="light"] {
        --bg: #fafafa; --panel: #ececec; --panel-edge: #d4d4d4; --fg: #1a1a1a;
        --muted: #6a6a6a; --pivot: #d32f2f; --accent: #2f6feb; --guide: #c4c4c4;
      }
      body[data-theme="sepia"] {
        --bg: #f4ecdc; --panel: #e8dcc4; --panel-edge: #d3c2a0; --fg: #433422;
        --muted: #8a7a5e; --pivot: #b3402a; --accent: #a9762f; --guide: #cbb892;
      }

      .screen { flex: 1; display: none; flex-direction: column; min-height: 0; }
      .screen.active { display: flex; }

      /* ---- input screen ---- */
      #input-screen { padding: 1.25rem; gap: 1rem; overflow-y: auto; }
      .brand { display: flex; align-items: baseline; gap: 0.6rem; }
      .brand h1 { font-size: 1.4rem; margin: 0; font-weight: 700; }
      .brand .pivot { color: var(--pivot); }
      .brand .tag { font-size: 0.8rem; color: var(--muted); }
      textarea {
        flex: 1; min-height: 40vh; width: 100%; resize: none;
        background: var(--panel); color: var(--fg);
        border: 1px solid var(--panel-edge); border-radius: 12px;
        padding: 1rem; font-size: 1rem; font-family: inherit;
      }
      .primary {
        background: var(--accent); color: #fff; border: none; border-radius: 12px;
        padding: 1rem; font-size: 1.05rem; font-weight: 600; cursor: pointer; width: 100%;
      }
      .primary:disabled { opacity: 0.4; }
      .abs { font-size: 0.9rem; display: flex; flex-direction: column; gap: 0.6rem; }
      .abs-label { color: var(--muted); }
      .lib-title { color: var(--muted); font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .text {
        width: 100%; background: var(--panel); color: var(--fg);
        border: 1px solid var(--panel-edge); border-radius: 10px;
        padding: 0.75rem; font-size: 0.95rem; font-family: inherit;
      }
      .status { font-size: 0.82rem; color: var(--muted); min-height: 1.2em; }
      .status.error { color: var(--pivot); }

      /* ---- chapter picker ---- */
      #chapter-screen { padding: 1rem; gap: 0.75rem; }
      .book-title { font-size: 1.15rem; margin: 0.25rem 0.25rem 0.2rem; }
      .book-stats { color: var(--muted); font-size: 0.8rem; margin: 0 0.25rem 0.6rem; }
      .chapter-list { list-style: none; margin: 0; padding: 0; overflow-y: auto; flex: 1; min-height: 0; }
      .chapter-list button {
        width: 100%; text-align: left; background: var(--panel); color: var(--fg);
        border: 1px solid var(--panel-edge); border-radius: 10px;
        padding: 0.85rem 1rem; margin-bottom: 0.5rem; cursor: pointer; font-size: 0.95rem;
        display: flex; justify-content: space-between; gap: 1rem;
      }
      .chapter-list .count { color: var(--muted); font-size: 0.8rem; white-space: nowrap; }
      .chapter-list .col { display: flex; flex-direction: column; gap: 0.15rem; align-items: flex-start; min-width: 0; }
      .chapter-list .col .ttl { overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
      .chapter-list .col .author { color: var(--muted); font-size: 0.78rem; }
      .chapter-list .badge { color: var(--accent); font-size: 0.8rem; white-space: nowrap; align-self: center; }
      .section-label { color: var(--muted); font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.06em; margin: 0.75rem 0.25rem 0.35rem; list-style: none; }

      /* ---- reader screen ---- */
      #reader-screen { padding: 1rem 1rem 1.5rem; }
      .topbar { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
      .iconbtn {
        background: var(--panel); color: var(--fg); border: 1px solid var(--panel-edge);
        border-radius: 10px; padding: 0.5rem 0.8rem; font-size: 0.95rem; cursor: pointer; flex: none;
      }
      .now { flex: 1; min-width: 0; text-align: center; }
      .now.hidden { visibility: hidden; }
      .now-title { display: block; font-size: 0.9rem; font-weight: 600;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .now-sub { display: block; font-size: 0.72rem; color: var(--muted);
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .stage {
        position: relative;
        flex: 1; display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 2rem; cursor: pointer;
        overflow: hidden; min-height: 0; width: 100%;
      }
      .transition {
        position: absolute; inset: 0; display: none; flex-direction: column;
        align-items: center; justify-content: center; gap: 1.25rem;
        background: var(--bg); text-align: center; padding: 1.5rem;
      }
      .transition.active { display: flex; }
      .transition .done { color: var(--muted); font-size: 0.8rem;
        text-transform: uppercase; letter-spacing: 0.08em; }
      .transition .next-label { color: var(--muted); font-size: 0.78rem; margin-bottom: 0.3rem; }
      .transition .next-title { font-size: 1.35rem; font-weight: 600; }
      .transition .continue { width: auto; padding: 0.7rem 1.5rem; }
      .word {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: clamp(2.25rem, 11vw, 4rem); line-height: 1;
        display: grid; grid-template-columns: 1fr auto 1fr;
        width: min(620px, 92vw); position: relative;
      }
      .word .left { text-align: right; white-space: pre; }
      .word .pivot { text-align: center; white-space: pre; color: var(--pivot); }
      .word .right { text-align: left; white-space: pre; }
      .word::before, .word::after {
        content: ""; position: absolute; left: 50%; width: 2px; height: 0.6rem;
        background: var(--guide); transform: translateX(-50%);
      }
      .word::before { top: -1.1rem; }
      .word::after { bottom: -1.1rem; }

      .panel { display: flex; flex-direction: column; gap: 0.9rem; width: min(620px, 92vw); margin: 0 auto; }
      .scrub { width: 100%; accent-color: var(--accent); height: 1.75rem; }
      .meta { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--muted); font-variant-numeric: tabular-nums; }
      .transport { display: flex; gap: 0.5rem; justify-content: center; }
      .transport button {
        flex: 1; max-width: 5rem; background: var(--panel); color: var(--fg);
        border: 1px solid var(--panel-edge); border-radius: 12px;
        padding: 0.7rem 0; font-size: 1.2rem; cursor: pointer;
      }
      .transport button.play { max-width: 7rem; }
      .fields { display: flex; align-items: center; justify-content: center; padding: 0 0.75rem; }
      .wpm-control { display: flex; align-items: center; gap: 0.6rem; width: 100%; }
      .wpm-control .lbl { color: var(--muted); font-size: 0.82rem; }
      .wpm-control input[type="range"] { flex: 1; accent-color: var(--accent); height: 1.75rem; }
      .wpm-control .val { color: var(--fg); font-variant-numeric: tabular-nums; min-width: 3.25rem; text-align: right; font-size: 0.9rem; }
      .stepbtn {
        background: var(--panel); color: var(--fg); border: 1px solid var(--panel-edge);
        border-radius: 10px; width: 2.4rem; height: 2.4rem; font-size: 1.4rem;
        line-height: 1; cursor: pointer; flex: none;
      }
      .stepbtn:active { background: var(--panel-edge); }
      select {
        background: var(--panel); color: var(--fg); border: 1px solid var(--panel-edge);
        border-radius: 10px; padding: 0.4rem 0.5rem; font-size: 0.82rem;
      }
    </style>
  </head>
  <body>
    <!-- Paste/input screen -->
    <section id="input-screen" class="screen active">
      <div class="brand">
        <h1>g<span class="pivot">r</span>ead</h1>
        <span class="tag">speed reader</span>
      </div>
      <textarea id="input" placeholder="Paste or type text to speed-read…"></textarea>
      <button id="read" class="primary" disabled>Read</button>

      <div class="abs">
        <div class="abs-label">Audiobookshelf</div>
        <input id="abs-key" class="text" type="password" autocomplete="off"
               placeholder="API key" />
        <button id="abs-connect" class="primary">Open my library</button>
        <div id="abs-status" class="status"></div>
      </div>
    </section>

    <!-- Library screen -->
    <section id="library-screen" class="screen">
      <div class="topbar">
        <button id="library-back" class="iconbtn">‹ Text</button>
        <span id="library-title" class="lib-title"></span>
      </div>
      <div id="library-status" class="status"></div>
      <ul id="book-list" class="chapter-list"></ul>
    </section>

    <!-- Chapter picker screen -->
    <section id="chapter-screen" class="screen">
      <div class="topbar">
        <button id="chapter-back" class="iconbtn">‹ Back</button>
      </div>
      <h2 id="book-title" class="book-title"></h2>
      <div id="book-stats" class="book-stats"></div>
      <ul id="chapter-list" class="chapter-list"></ul>
    </section>

    <!-- Reader screen -->
    <section id="reader-screen" class="screen">
      <div class="topbar">
        <button id="back" class="iconbtn">‹</button>
        <div class="now" id="now-reading">
          <span class="now-title" id="now-title"></span>
          <span class="now-sub" id="now-sub"></span>
        </div>
        <select id="theme" aria-label="Theme"></select>
      </div>

      <div class="stage" id="stage">
        <div class="word" id="word"></div>
        <div class="transition" id="transition">
          <span class="done" id="transition-done">✓ Chapter complete</span>
          <div class="up-next" id="up-next">
            <div class="next-label">Up next</div>
            <div class="next-title" id="next-title"></div>
          </div>
          <button id="continue" class="primary continue">Continue ▶</button>
        </div>
      </div>

      <div class="panel">
        <input type="range" id="scrub" class="scrub" min="0" max="0" value="0" />
        <div class="meta"><span id="position">0 / 0</span><span id="eta">—</span></div>
        <div class="transport">
          <button id="restart" title="Chapter start (again to go back a chapter)">⏮</button>
          <button id="step-back" title="Back">◀</button>
          <button id="playpause" class="play">▶</button>
          <button id="step-fwd" title="Forward">▶</button>
          <button id="skip-end" title="Chapter end (again to skip a chapter)">⏭</button>
        </div>
        <div class="fields">
          <div class="wpm-control">
            <span class="lbl">WPM</span>
            <button id="wpm-down" class="stepbtn" aria-label="Decrease WPM">−</button>
            <input type="range" id="wpm" min="100" max="1000" step="25" />
            <button id="wpm-up" class="stepbtn" aria-label="Increase WPM">+</button>
            <span class="val" id="wpm-val"></span>
          </div>
        </div>
      </div>
    </section>

    <script type="module" src="../src/pwa/main.ts"></script>
  </body>
</html>
